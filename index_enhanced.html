<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>世界十大新闻 - {{NEWS_DATE}} | 环球新闻</title>
    <meta name="description" content="{{NEWS_DATE}}全球10大热点新闻，涵盖科技、政治、军事、汽车等领域的最新动态">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-image: url('images/website-background-8k.png');
            --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --container-bg: white; --text-color: #333;
            --card-bg: linear-gradient(145deg, #f6f8fa 0%, #ffffff 100%);
            --tag-bg: #e8f4f8; --tag-color: #1976d2;
            --warning-bg: #fff3cd; --warning-border: #ffc107; --warning-color: #856404;
            --footer-bg: #f8f9fa; --footer-color: #6c757d;
            --nav-bg: white; --nav-text: #333; --search-bg: #f8f9fa; --border-color: rgba(0,0,0,0.1);
        }
        .dark-mode {
            --bg-gradient: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            --container-bg: #1a1a2e; --text-color: #e0e0e0;
            --card-bg: linear-gradient(145deg, #252540 0%, #1f1f38 100%);
            --tag-bg: #1a3a5c; --tag-color: #64b5f6;
            --warning-bg: #4a4732; --warning-border: #7c6d00; --warning-color: #d4c656;
            --footer-bg: #16213e; --footer-color: #a0a0a0;
            --nav-bg: #1f1f38; --nav-text: #e0e0e0; --search-bg: #252540; --border-color: rgba(255,255,255,0.1);
        }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; line-height: 1.8; background: var(--bg-image) no-repeat center center fixed; background-size: cover; min-height: 100vh; padding: 20px; color: var(--text-color); }
        .container { max-width: 1200px; margin: 0 auto; background: rgba(255,255,255,0.85); border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); overflow: hidden; }
        .navbar { background: var(--nav-bg); padding: 20px 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--border-color); position: sticky; top: 0; z-index: 100; }
        .navbar-brand { font-size: 1.5em; font-weight: bold; color: var(--nav-text); text-decoration: none; }
        .nav-links { display: flex; gap: 20px; list-style: none; }
        .nav-links a { color: var(--nav-text); text-decoration: none; font-weight: 500; }
        .nav-links a:hover { color: #667eea; }
        .theme-toggle { background: none; border: 2px solid var(--border-color); color: var(--nav-text); padding: 8px 16px; border-radius: 20px; cursor: pointer; }
        .theme-toggle:hover { background: var(--tag-bg); color: #667eea; }
        .search-container { padding: 20px 30px; background: var(--nav-bg); border-bottom: 1px solid var(--border-color); }
        .search-box { width: 100%; padding: 12px 20px; border: 2px solid var(--border-color); border-radius: 25px; font-size: 1em; background: var(--search-bg); color: var(--text-color); }
        .search-box:focus { outline: none; border-color: #667eea; box-shadow: 0 0 0 3px rgba(102,126,234,0.1); }
        header { background: var(--bg-gradient); color: white; padding: 50px 30px; text-align: center; position: relative; overflow: hidden; }
        @keyframes pulse { 0%,100%{transform:translate(-30%,-30%) scale(1);} 50%{transform:translate(-30%,-30%) scale(1.1);} }
        header::before { content:''; position:absolute; top:-50%; left:-50%; width:200%; height:200%; background:radial-gradient(circle,rgba(255,255,255,0.1) 0%,transparent 70%); animation:pulse 3s ease-in-out infinite; }
        .cover-section { position:relative; width:100%; height:400px; margin-bottom:30px; border-radius:12px; overflow:hidden; box-shadow:0 8px 16px rgba(0,0,0,0.2); }
        .cover-image { width:100%; height:100%; object-fit:cover; }
        .cover-overlay { position:absolute; bottom:0; left:0; right:0; background:linear-gradient(to top,rgba(0,0,0,0.8),transparent); padding:40px 30px; color:white; }
        .cover-title { font-size:3em; margin-bottom:10px; text-shadow:2px 2px 4px rgba(0,0,0,0.5); }
        .cover-subtitle { font-size:1.3em; opacity:0.9; }
        @media(max-width:768px){.cover-section{height:300px;}.cover-title{font-size:2em;}.nav-links{display:none;}.news-grid{grid-template-columns:1fr;}}
        .content { padding: 40px 30px; }
        .news-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(500px, 1fr)); gap: 30px; margin-top: 40px; }
        @media (max-width: 768px) { .news-grid { grid-template-columns: 1fr; } h1 { font-size: 1.8em; } }
        .news-card { background: var(--card-bg); border-radius: 12px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.05); transition: transform 0.3s, box-shadow 0.3s; border: 1px solid var(--border-color); }
        .news-card:hover { transform: translateY(-5px); box-shadow: 0 12px 24px rgba(0,0,0,0.15); }
        .news-card.hidden { display: none; }
        .news-image { width: 100%; height: 280px; object-fit: cover; display: block; cursor: pointer; transition: transform 0.3s; }
        .news-card:hover .news-image { transform: scale(1.05); }
        .news-content { padding: 20px; }
        .news-number { display: inline-block; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 5px 15px; border-radius: 20px; font-size: 0.9em; font-weight: bold; margin-bottom: 12px; }
        .news-title { font-size: 1.4em; font-weight: bold; margin-bottom: 12px; color: var(--text-color); line-height: 1.4; }
        .news-summary { color: var(--text-color); opacity: 0.8; line-height: 1.7; font-size: 1em; }
        .tag { display: inline-block; padding: 5px 12px; margin: 8px 4px 0 0; background: var(--tag-bg); color: var(--tag-color); border-radius: 12px; font-size: 0.85em; font-weight: 500; }
        .warning { background: var(--warning-bg); border-left: 4px solid var(--warning-border); padding: 15px 20px; margin: 30px 0; border-radius: 4px; color: var(--warning-color); font-size: 0.95em; }
        footer { background: var(--footer-bg); padding: 30px; text-align: center; color: var(--footer-color); font-size: 0.95em; border-top: 2px solid var(--border-color); }
        footer a { color: #667eea; text-decoration: none; font-weight: 500; }
        footer a:hover { text-decoration: underline; }
        .footer-links { margin-top: 15px; }
        .footer-links a { margin: 0 10px; color: var(--footer-color); }
        .comments-section { padding: 40px 30px; background: var(--container-bg); border-top: 2px solid var(--border-color); }
        .comments-title { font-size: 1.5em; font-weight: bold; margin-bottom: 20px; color: var(--text-color); }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="navbar-brand">📰 环球新闻</a>
        <ul class="nav-links">
            <li><a href="index.html">首页</a></li>
            <li><a href="about.html">关于</a></li>
            <li><a href="contact.html">联系</a></li>
            <li><a href="history.html">历史</a></li>
            <li><a href="rss.xml">RSS</a></li>
        </ul>
        <button class="theme-toggle" onclick="toggleTheme()">🌓 切换主题</button>
    </nav>
    <div class="search-container">
        <input type="text" class="search-box" id="searchInput" placeholder="🔍 搜索新闻标题或内容..." onkeyup="searchNews()">
    </div>
    <div class="container">
        <div class="content">
            <div class="cover-section">
                <img src="images/cover.png" alt="环球新闻封面" class="cover-image">
                <div class="cover-overlay">
                    <h1 class="cover-title">🌍 环球新闻</h1>
                    <p class="cover-subtitle">世界十大新闻 · {{NEWS_DATE}}</p>
                </div>
            </div>
            <div class="warning">⚠️ <strong>注意：</strong> 新闻信息基于搜索结果整理，图片由 AI 生成，仅供参考。建议通过官方渠道获取最新准确信息。</div>
            <div class="news-grid" id="newsGrid">{{NEWS_CARDS}}
            </div>
        </div>
        <div class="comments-section">
            <h2 class="comments-title">💬 评论区</h2>
            <script src="https://giscus.app/client.js"
                data-repo="yww001/news-blog" data-repo-id="R_kgDORthBdA"
                data-category="Announcements" data-category-id="DIC_kwDORthBdM4C5AnK"
                data-mapping="pathname" data-strict="0" data-reactions-enabled="1"
                data-emit-metadata="0" data-input-position="top"
                data-theme="preferred_color_scheme" data-lang="zh-CN"
                crossorigin="anonymous" async></script>
        </div>
        <footer>
            <p>📰 新闻生成与发布 by <a href="https://github.com/nickmccart/hn" target="_blank">Hermes Agent</a> | 图片生成 by <a href="https://build.nvidia.com/" target="_blank">NVIDIA AI</a></p>
            <div class="footer-links">
                <a href="index.html">首页</a> | <a href="about.html">关于</a> | <a href="contact.html">联系</a> | <a href="rss.xml">RSS 订阅</a>
            </div>
            <p style="margin-top:10px;font-size:0.9em;">所有新闻内容仅供参考，请以官方发布为准 · {{NEWS_DATE}}</p>
        </footer>
    </div>
    <script>
        function toggleTheme(){document.body.classList.toggle('dark-mode');localStorage.setItem('theme',document.body.classList.contains('dark-mode')?'dark':'light');}
        const saved=localStorage.getItem('theme');if(saved==='dark')document.body.classList.add('dark-mode');
        if(window.matchMedia&&window.matchMedia('(prefers-color-scheme:dark)').matches&&!saved)document.body.classList.add('dark-mode');
        function searchNews(){const i=document.getElementById('searchInput').value.toLowerCase();document.querySelectorAll('.news-card').forEach(c=>{const t=c.querySelector('.news-title').textContent.toLowerCase(),s=c.querySelector('.news-summary').textContent.toLowerCase(),g=Array.from(c.querySelectorAll('.tag')).map(x=>x.textContent.toLowerCase()).join(' ');(t.includes(i)||s.includes(i)||g.includes(i))?c.classList.remove('hidden'):c.classList.add('hidden');});}
    </script>
</body>
</html>
